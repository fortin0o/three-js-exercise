<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="white"/>
  <!-- Outer border -->
  <rect x="10" y="10" width="380" height="380" fill="black"/>
  <rect x="30" y="30" width="340" height="340" fill="white"/>
  <!-- Corner squares - TL -->
  <rect x="50" y="50" width="90" height="90" fill="black"/>
  <rect x="65" y="65" width="60" height="60" fill="white"/>
  <rect x="78" y="78" width="34" height="34" fill="black"/>
  <!-- Corner squares - TR -->
  <rect x="260" y="50" width="90" height="90" fill="black"/>
  <rect x="275" y="65" width="60" height="60" fill="white"/>
  <rect x="288" y="78" width="34" height="34" fill="black"/>
  <!-- Corner squares - BL -->
  <rect x="50" y="260" width="90" height="90" fill="black"/>
  <rect x="65" y="275" width="60" height="60" fill="white"/>
  <rect x="78" y="288" width="34" height="34" fill="black"/>
  <!-- Data cells (unique pattern for this marker) -->
  <!-- Row 1 -->
  <rect x="160" y="50" width="20" height="20" fill="black"/>
  <rect x="200" y="50" width="20" height="20" fill="black"/>
  <rect x="220" y="50" width="20" height="20" fill="black"/>
  <!-- Row 2 -->
  <rect x="160" y="80" width="20" height="20" fill="black"/>
  <rect x="180" y="80" width="20" height="20" fill="black"/>
  <rect x="240" y="80" width="20" height="20" fill="black"/>
  <!-- Row 3 -->
  <rect x="160" y="110" width="20" height="20" fill="black"/>
  <rect x="220" y="110" width="20" height="20" fill="black"/>
  <!-- Side data -->
  <rect x="50" y="160" width="20" height="20" fill="black"/>
  <rect x="50" y="180" width="20" height="20" fill="black"/>
  <rect x="50" y="220" width="20" height="20" fill="black"/>
  <rect x="330" y="160" width="20" height="20" fill="black"/>
  <rect x="330" y="200" width="20" height="20" fill="black"/>
  <rect x="330" y="240" width="20" height="20" fill="black"/>
  <!-- Bottom row -->
  <rect x="160" y="300" width="20" height="20" fill="black"/>
  <rect x="200" y="300" width="20" height="20" fill="black"/>
  <rect x="240" y="300" width="20" height="20" fill="black"/>
  <rect x="160" y="330" width="20" height="20" fill="black"/>
  <rect x="180" y="330" width="20" height="20" fill="black"/>
  <rect x="220" y="330" width="20" height="20" fill="black"/>
  <rect x="260" y="330" width="20" height="20" fill="black"/>
  <!-- Center engine icon -->
  <g transform="translate(200,200)">
    <!-- Engine block -->
    <rect x="-30" y="-20" width="60" height="40" fill="black" rx="3"/>
    <!-- Cylinders -->
    <rect x="-22" y="-32" width="14" height="14" fill="black" rx="2"/>
    <rect x="-6" y="-32" width="14" height="14" fill="black" rx="2"/>
    <rect x="10" y="-32" width="14" height="14" fill="black" rx="2"/>
    <!-- Bottom -->
    <rect x="-20" y="20" width="40" height="12" fill="black" rx="2"/>
  </g>
</svg>
